name: ci

on:
  push:
  workflow_dispatch:

permissions: {}

# Cancel superseded runs on PR branches; never cancel main, since a
# mid-flight publish could upload to PyPI before the post-publish release
# tags are finalized.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "1.5.1"
  PYPI_PACKAGE_NAME: phenoml

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version "${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install

      - name: Compile
        run: poetry run mypy .

  test:
    needs: [ compile ]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version "${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install

      - name: Test
        run: poetry run pytest -rP .

  release_gate:
    needs: [ compile, test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    uses: PhenoML/sdk-shared-actions/.github/workflows/sdk-release-gate.yml@1.3.0
    with:
      version-source: pyproject
      version-path: pyproject.toml
      spec-path: src/phenoml/openapi/openapi.json

  verify_openapi_spec:
    needs: [ release_gate ]
    if: github.ref == 'refs/heads/main' && needs.release_gate.outputs.should_publish != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify bundled OpenAPI spec
        uses: PhenoML/sdk-shared-actions/verify-openapi-spec@1.3.0
        with:
          spec-path: src/phenoml/openapi/openapi.json

  build-artifact:
    needs: [ release_gate ]
    if: needs.release_gate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bootstrap poetry
        run: |
          curl -sSL https://install.python-poetry.org | python - -y --version "${{ env.POETRY_VERSION }}"

      - name: Build distribution
        run: poetry build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [ release_gate, build-artifact ]
    if: needs.release_gate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # Environment-scoped OIDC: the environment's deployment branch rule
    # restricts this job to refs/heads/main, and the PyPI Trusted Publisher
    # binding requires this environment name — so a publish from any other
    # ref or workflow is rejected end-to-end.
    environment: pypi-production
    permissions:
      id-token: write
      contents: read
    outputs:
      published: ${{ steps.verify.outputs.published }}

    steps:
      # download-artifact verifies the downloaded bundle against GitHub's
      # recorded digest by default (digest-mismatch: error).
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        id: pypi-publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

      - name: Verify PyPI version availability
        id: verify
        env:
          VERSION: ${{ needs.release_gate.outputs.version }}
        run: |
          set -euo pipefail
          if curl -fsS "https://pypi.org/pypi/${PYPI_PACKAGE_NAME}/${VERSION}/json" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::${PYPI_PACKAGE_NAME} ${VERSION} is not available on PyPI."
          exit 1

  confirm_registry_release:
    needs: [ release_gate, verify_openapi_spec ]
    if: needs.release_gate.outputs.release_state == 'repair'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.verify.outputs.published }}

    steps:
      - name: Verify PyPI version availability
        id: verify
        env:
          VERSION: ${{ needs.release_gate.outputs.version }}
        run: |
          set -euo pipefail
          if curl -fsS "https://pypi.org/pypi/${PYPI_PACKAGE_NAME}/${VERSION}/json" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::${PYPI_PACKAGE_NAME} ${VERSION} is not available on PyPI."
          exit 1

  release_finalize:
    needs: [ release_gate, publish, confirm_registry_release ]
    if: always() && needs.release_gate.result == 'success' && (needs.publish.outputs.published == 'true' || needs.confirm_registry_release.outputs.published == 'true')
    permissions:
      contents: write
    uses: PhenoML/sdk-shared-actions/.github/workflows/sdk-release-finalize.yml@1.3.0
    with:
      version-tag: ${{ needs.release_gate.outputs.version_tag }}
      origin-commit: ${{ needs.release_gate.outputs.origin_commit }}
      origin-tag: ${{ needs.release_gate.outputs.origin_tag }}
