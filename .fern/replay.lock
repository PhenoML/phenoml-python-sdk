    theirs_snapshot:
      pyproject.toml: |
        [project]
        name = "phenoml"
        dynamic = ["version"]

        [tool.poetry]
        name = "phenoml"
        version = "15.2.1"
        description = ""
        readme = "README.md"
        authors = []
        keywords = []

        classifiers = [
            "Intended Audience :: Developers",
            "Programming Language :: Python",
            "Programming Language :: Python :: 3",
            "Programming Language :: Python :: 3.10",
            "Programming Language :: Python :: 3.11",
            "Programming Language :: Python :: 3.12",
            "Programming Language :: Python :: 3.13",
            "Programming Language :: Python :: 3.14",
            "Programming Language :: Python :: 3.15",
            "Operating System :: OS Independent",
            "Operating System :: POSIX",
            "Operating System :: MacOS",
            "Operating System :: POSIX :: Linux",
            "Operating System :: Microsoft :: Windows",
            "Topic :: Software Development :: Libraries :: Python Modules",
            "Typing :: Typed"
        ]
        packages = [
            { include = "phenoml", from = "src"}
        ]
        include = [
            { path = "src/phenoml/openapi/openapi.json", format = ["sdist", "wheel"] }
        ]

        [tool.poetry.urls]
        Repository = 'https://github.com/phenoml/phenoml-python-sdk'

        [tool.poetry.dependencies]
        python = "^3.10"
        aiohttp = { version = ">=3.14.0,<4", optional = true, python = ">=3.10"}
        httpx = ">=0.21.2"
        httpx-aiohttp = { version = "0.1.8", optional = true, python = ">=3.10"}
        pydantic = ">= 1.9.2"
        pydantic-core = ">=2.18.2,<3.0.0"
        typing_extensions = ">= 4.0.0"

        [tool.poetry.group.dev.dependencies]
        mypy = "==1.13.0"
        pytest = "^9.0.3"
        pytest-asyncio = "^1.0.0"
        pytest-xdist = "^3.6.1"
        python-dateutil = "^2.9.0"
        types-python-dateutil = "^2.9.0.20240316"
        urllib3 = ">=2.6.3,<3.0.0"
        requests = "^2.33.0"
        types-requests = "^2.33.0"
        ruff = "==0.11.5"

        [tool.pytest.ini_options]
        testpaths = [ "tests" ]
        asyncio_mode = "auto"
        markers = [
            "aiohttp: tests that require httpx_aiohttp to be installed",
        ]

        [tool.mypy]
        plugins = ["pydantic.mypy"]

        [tool.ruff]
        line-length = 120

        [tool.ruff.lint]
        select = [
            "E",  # pycodestyle errors
            "F",  # pyflakes
            "I",  # isort
        ]
        ignore = [
            "E402",  # Module level import not at top of file
            "E501",  # Line too long
            "E711",  # Comparison to `None` should be `cond is not None`
            "E712",  # Avoid equality comparisons to `True`; use `if ...:` checks
            "E721",  # Use `is` and `is not` for type comparisons, or `isinstance()` for insinstance checks
            "E722",  # Do not use bare `except`
            "E731",  # Do not assign a `lambda` expression, use a `def`
            "F821",  # Undefined name
            "F841"   # Local variable ... is assigned to but never used
        ]

        [tool.ruff.lint.isort]
        section-order = ["future", "standard-library", "third-party", "first-party"]

        [build-system]
        requires = ["poetry-core"]
        build-backend = "poetry.core.masonry.api"

        [tool.poetry.extras]
        aiohttp=["aiohttp", "httpx-aiohttp"]
